<!DOCTYPE html>
<html>

<head>
    <!-- The '/homey.js' script must be included in your settings view to work -->
    <script type="text/javascript" src="/homey.js" data-origin="settings"></script>
</head>

<body>
    <header class="homey-header">
        <h1 class="homey-title" data-i18n="settings.title">
            <!-- This will be filled with the translated string with key 'settings.title'. -->
        </h1>
        <p class="homey-subtitle" data-i18n="settings.subtitle">
            <!-- This field will also be translated -->
        </p>
    </header>
    
    <div>...</div>

    <fieldset class="homey-form-fieldset">
        <legend class="homey-form-legend">Credentials</legend>

        <div class="homey-form-group">
            <label class="homey-form-label" for="inputEmail">Email</label>
            <input class="homey-form-input" id="inputEmail" type="email" value="" placeholder="Email" />
            <small class="text-muted">Login email</small>
        </div>

        <div class="homey-form-group">
            <label class="homey-form-label" for="inputPassword">Password</label>
            <input class="homey-form-input" id="inputPassword" type="password" value="" placeholder="Password" />
            <small class="text-muted">Login password</small>
        </div>

        <div class="homey-form-group">
            <label class="homey-form-label" for="inputClientId">Client ID</label>
            <input class="homey-form-input" id="inputClientId" type="text" value="" placeholder="Client ID" />
            <small class="text-muted">Your application's client ID</small>
        </div>

        
        <div class="homey-form-group">
            <label class="homey-form-label" for="inputClientSecret">Client Secret</label>
            <input class="homey-form-input" id="inputClientSecret" type="password" value="" placeholder="Client Secret" />
            <small class="text-muted">Your application's client secret</small>
        </div>

        <div class="homey-form-group">
            <label class="homey-form-label" for="inputRedirectUri">Redirect URI</label>
            <input class="homey-form-input" id="inputRedirectUri" type="text" value="" placeholder="https://app.cameconnect.net/role" />
            <small class="text-muted">Default: https://app.cameconnect.net/role</small>
        </div>

    </fieldset>

    <button id="save" class="homey-button-primary-full">Save changes</button>

    <script type="text/javascript">
        // a method named 'onHomeyReady' must be present in your code
        function onHomeyReady(Homey) {
            // Tell Homey we're ready to be displayed
            Homey.ready();

            var inputEmailElement        = document.getElementById("inputEmail");
            var inputPasswordElement     = document.getElementById("inputPassword");
            var inputClientIdElement     = document.getElementById("inputClientId");
            var inputClientSecretElement = document.getElementById("inputClientSecret");
            var inputRedirectUriElement  = document.getElementById("inputRedirectUri");

            var saveElement = document.getElementById("save");

            Homey.get("CameConnectEmail", function (err, token) {
                if (err) return Homey.alert(err);
                inputEmailElement.value = token;
            });
            
            Homey.get("CameConnectPassword", function (err, userKey) {
                if (err) return Homey.alert(err);
                inputPasswordElement.value = userKey;
            });
            
            Homey.get("CameConnectClientId", function (err, clientId) {
                if (err) return Homey.alert(err);
                inputClientIdElement.value = clientId;
            });

            Homey.get("CameConnectClientSecret", function (err, clientSecret) {
                if (err) return Homey.alert(err);
                inputClientSecretElement.value = clientSecret;
            });

            Homey.get("CameConnectRedirectUri", function (err, redirectUri) {
                if (err) return Homey.alert(err);
                inputRedirectUriElement.value = redirectUri || "https://app.cameconnect.net/role";
            });

            
            saveElement.addEventListener("click", function (e) {
                var anySaveErrors = false;

                Homey.set("CameConnectEmail", inputEmailElement.value, function (err) {
                    if (err) {
                        anySaveErrors = true;
                        return Homey.alert(err);
                    } 
                });

                Homey.set("CameConnectPassword", inputPasswordElement.value, function (err) {
                    if (err) {
                        anySaveErrors = true;
                        return Homey.alert(err);
                    } 
                });

                Homey.set("CameConnectClientId", inputClientIdElement.value, function (err) {
                    if (err) {
                        anySaveErrors = true;
                        return Homey.alert(err);
                    } 
                });

                Homey.set("CameConnectClientSecret", inputClientSecretElement.value, function (err) {
                    if (err) {
                        anySaveErrors = true;
                        return Homey.alert(err);
                    } 
                });

                Homey.set("CameConnectRedirectUri", inputRedirectUriElement.value || "https://app.cameconnect.net/role", function (err) {
                    if (err) {
                        anySaveErrors = true;
                        return Homey.alert(err);
                    } 
                });

                // Force a clean login after settings change.
                Homey.set("CameConnectAccessToken", null, function () {});
                Homey.set("CameConnectRefreshToken", null, function () {});

                if (!anySaveErrors)
                    return Homey.alert("Settings saved. You can close this dialog now. \nPlease restart the Application - for the new settings to take effect.");
                else
                    return Homey.alert("Error occured.");

            });
        }
    </script>
</body>

</html>
